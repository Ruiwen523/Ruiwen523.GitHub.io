name: Lint Commit Messages
on: pull_request

jobs:
  commitlint:
    if: ${{ !(github.base_ref == 'developer' && github.head_ref == 'main') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v5
