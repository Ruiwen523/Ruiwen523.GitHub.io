<div class="grammar-card">
  <div class="grammar-card__header">
    <h3>{{ include.title }}</h3>
    <span class="grammar-card__progress"></span>
  </div>

  {% assign speech_sentence = include.question | replace: '___', include.answer %}

  <div class="question-row">
    <p class="question-text">
      {{ include.question }}
    </p>

    <button
      class="question-audio-button"
      hidden
      type="button"
      data-speak-sentence="{{ speech_sentence | escape }}"
      aria-label="Play American pronunciation"
      title="Play American pronunciation"
    >
      <i class="fas fa-volume-high" aria-hidden="true"></i>
    </button>
  </div>

  {% if include.translation %}
    <p class="question-translation">
      {{ include.translation }}
    </p>
  {% endif %}

  <div class="options">
    <button onclick="checkAnswer(this, 'am', '{{ include.answer }}')">am</button>
    <button onclick="checkAnswer(this, 'is', '{{ include.answer }}')">is</button>
    <button onclick="checkAnswer(this, 'are', '{{ include.answer }}')">are</button>
  </div>

  <div class="result"></div>

  <div
    class="analysis"
    data-analysis="{{ include.analysis | escape }}"
  ></div>
</div>
